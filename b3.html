<html>
<head>
	<title> MarkSheet </title>
	</head>
<body>
	<script>
		var name = prompt("Enter your name");
			document.write("Hello " + name + "<br>");
		var num = prompt("Enter your marks");
		num = parseInt(num);
		
		if (num>=90 && num<=100) {
			document.write("result is Grade  A+");
			} else if (num>=70 && num<=89) {
				document.write("your result is Grade A");
				}
			else if (num>=50 && num<=69)  {
				document.write("your result is Grade B");
				}
			else if (num>=36 && num<=49)  {
				document.write("your result is grade C");
					}
			else if (num>=1 && num<=35) {
				document.write("your result is fail ");
				}
					else {
					document.write("you enter wrong number");
					}
	</script>
</body>
</html>
