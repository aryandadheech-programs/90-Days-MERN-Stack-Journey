<html>
<head>
	<title>loops</title>
	</head>
<body>
		<script>/*loops*/
			 
			 var i = 1;
			 
			 for (var i=0; i<10; i++);{
			 document.write(i + "<br>"+"<br>");
			 }
			  </script>
			  
			  <script>/*table*/
			  
			  var a = prompt("enter the number ");
			  a = parseInt(a);
			  
			  for (i=1 ; i<=10; i++) {
			  document.write(a*i + "<br>");
			  }
			  </script>
			  
			  <script>/*reverse number*/
			  for (i = 20 ; i>=0; i--)  {
			  document.write(i + "<br>"+"<br>");
			  }
			  
			  </script>
			  
			  <script>/* even number*/
			  
			  for (i = 1 ; i<=20 ; i++) {
			  if (i%2 ==0) {
			  document.write(i + "<br>");
			  }
			  }
			  
			  </script>
			  
			  <script>/*sum*/
			  var a = prompt("Enter the number");
			  a = parseInt(a);
			  var sum = 0;
			  
			  for (i = 1; i<=a; i++) {
				sum = sum + i;
				}
				document.write("sum" +sum +"<br>");
				
			  </script>
			  
			  <script>/*factorial*/
			  var b = prompt("Enter the number factorial");
			  b = parseInt(b);
			  var fact = 1;
			  
			  for (i = 1; i<=b; i++) {
				fact = fact*i;
				}
				document.write("factorial" + fact);
			  
			  </script>
			  
			  <script>/* table 1 to 10 */
			  var num = prompt("enter the number of table");
			  num = parseInt(num);
			  for (i = 1; i<=num; i++) {
			  
			  for (j = 1; j<=10; j++) {
				document.write(i + "X"  + j +"="+(i*j)+"<br>");
				}
				document.write("<br>");
				}
			  
			  </script>
			  
			  <script>// prime number
			  var num = prompt("Enter the number for prime or not ");
			  var isprime = true;
			  num = parseInt(num);
			  
			  for (i = 2; i<num; i++) {
				if (num%i==0) {
				isprime = false;
				break;
				}
				}
				if(num>1 && isprime) {
				document.write(num+"prime number"+"<br>");
				} else {
				document.write(num+"not prime"+"<br>");
				}
			  </script>
			  
			  <script>// factor
			  var num = prompt("enter the number ");
			  num = parseInt(num);
			  
			  for (i = 1; i<=num; i++) {
			  if (num%i==0) {
			  document.write(i+"factor"+"<br>");
			  }
			  }
			  </script>
</body>
</html>
