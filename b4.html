<body>
		<script>/* largest number*/
			var a = prompt("enter the 1st number ");
			var b = prompt("enter the 2nd number ");
			var c = prompt("enter the 3rd number ");
			
			a = parseInt(a);
			b = parseInt(b);
			c = parseInt(c);
			
			if (a>b && a>c) {
				document.write(a + "is largest number "+"<br>");
				}
				else if (b>a && b>c) {
				document.write(b + "is largest number "+"<br>");
				}
				else if (c>a && c>b) {
				document.write(c + "is largest number "+"<br>");
				}
				else {
				document.write("wrong input"+"<br>");
				}
			</script>
